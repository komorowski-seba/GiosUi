<tui-root>
  <button
    tuiButton
    appearance="primary"
    (click)="open = !open"
  >
    Menu
  </button>

  <tui-drawer
    direction="left"
    [(open)]="open"
    class="sidebar"
  >
    <nav class="menu">
      <a routerLink="/map" routerLinkActive="active">Map</a>
      <a routerLink="/list" routerLinkActive="active">List</a>
    </nav>
  </tui-drawer>

  <router-outlet></router-outlet>
</tui-root>
